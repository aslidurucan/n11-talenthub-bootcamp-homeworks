services:
  postgres:
    image: postgres:15
    container_name: n11ecommerce-db
    environment:
      POSTGRES_DB: n11ecommercedb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5435:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: