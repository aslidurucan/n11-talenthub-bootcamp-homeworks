spring.application.name=n11ecommerce

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5435/n11ecommercedb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET:dev-only-secret-change-in-production-min-32-chars}
jwt.access-token-validity=${JWT_ACCESS_TOKEN_VALIDITY:60000}
jwt.refresh-token-validity=${JWT_REFRESH_TOKEN_VALIDITY:604800000}

server.port=8080
